<!DOCTYPE html>
<html lang="ps">
<head>
<meta charset="UTF-8">
<title>Kankor Quiz</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
}

.container{
width:600px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
margin-top:50px;
}

button{
display:block;
width:100%;
padding:12px;
margin:8px 0;
font-size:16px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h1>د کانکور ازموینې سیستم</h1>

<h2 id="question"></h2>

<div id="answers"></div>

<p id="result"></p>

</div>

<script>

let questions=[

{
q:"2 + 2 = ؟",
options:["3","4","5","6"],
answer:1
},

{
q:"5 × 3 = ؟",
options:["15","10","20","8"],
answer:0
},

{
q:"د افغانستان پلازمینه څه ده؟",
options:["کابل","کندهار","هرات","مزار"],
answer:0
}

]

let current=0
let score=0

function loadQuestion(){

let q=questions[current]

document.getElementById("question").innerText=q.q

let answers=""

q.options.forEach((opt,i)=>{
answers+=`<button onclick="check(${i})">${opt}</button>`
})

document.getElementById("answers").innerHTML=answers

}

function check(i){

if(i==questions[current].answer){
score++
}

current++

if(current<questions.length){
loadQuestion()
}else{

document.querySelector(".container").innerHTML=
"<h2>ازموینه ختم شوه</h2><p>ستاسو نمره: "+score+" / "+questions.length+"</p>"

}

}

loadQuestion()

</script>

</body>
</html>
